<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian Automata - Final</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <script src="https://unpkg.com/kaboom@3000.1.17/dist/kaboom.js"></script>
    <script>
        kaboom({
            background: [10, 10, 15],
            width: 1280,
            height: 720,
            letterbox: true,
        });

        // Configurable Controls (Edit here to change key bindings)
        const CONTROLS = {
            MOVE_UP: "up",
            MOVE_DOWN: "down",
            MOVE_LEFT: "left",
            MOVE_RIGHT: "right",
            BUILD_TURRET: "w",
            BUILD_WALL: "s",
            BUILD_TRAP: "d",
            UPGRADE_SPEED: "q",
            UPGRADE_CAPACITY: "e",
        };

        // Load Sprites (Step 4)
        // Note: Using relative paths assuming opened from the root folder
        // Load Sprites (Base64 for CORS stability)
        // Load Sprites (Base64 for CORS stability)
        const map1_b64 = "assets/map1_b64.png";
        const map2_b64 = "assets/map2_b64.png";
        const player_b64 = "assets/player_b64.png";
        const girl_b64 = "assets/girl_b64.png";

        loadSprite("map1", map1_b64);
        loadSprite("map2", map2_b64);
        loadSprite("player", player_b64);
        loadSprite("girl", "assets/girl.png", {
            sliceX: 8,
            anims: {
                idle: { from: 0, to: 0, speed: 1, loop: false },
                yawn: { from: 0, to: 3, speed: 2, loop: false },
                swing: { from: 4, to: 7, speed: 4, loop: false }
            }
        });
        loadSprite("obs_ruins", "assets/obs_ruins.png");
        loadSprite("obs_car", "assets/obs_car.png");
        loadSprite("obs_playground", "assets/obs_playground.png");
        loadSprite("obs_ground", "assets/obs_ground.png");
        const wide_map_b64 = "assets/wide_map_b64.png";
        loadSprite("wide_map", wide_map_b64);

        // Sound System (Step 5)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, duration, type = "sine", volume = 0.1, freqEnd = 0.01) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if (freqEnd > 0) {
                    osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + duration);
                }
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {
                console.warn("Audio error:", e);
            }
        }

        const sounds = {
            shoot: () => playSound(800, 0.15, "sawtooth", 0.05, 100),
            explode: () => playSound(120, 0.4, "square", 0.15, 20),
            collect: () => playSound(1500, 0.1, "sine", 0.1, 800),
            build: () => playSound(400, 0.2, "triangle", 0.1, 200),
            damage: () => playSound(200, 0.3, "sawtooth", 0.2, 50),
            waveStart: () => playSound(300, 0.5, "sine", 0.1, 600),
            spawn: () => playSound(600, 0.2, "sine", 0.1, 1200),
        };

        scene("start", () => {
            add([
                circle(40),
                color(255, 100, 200),
                pos(width() / 2, height() / 2 - 120),
                anchor("center"),
            ]);
            add([
                text("GUARDIAN AUTOMATA", { size: 48, font: "monospace" }),
                pos(width() / 2, height() / 2 - 20),
                anchor("center"),
                color(0, 255, 100),
            ]);

            add([
                text("ARROWS: MOVE | W, S, D: BUILD | Q, E: UPGRADE", { size: 18, font: "monospace" }),
                pos(width() / 2, height() / 2 + 40),
                anchor("center"),
                color(0, 255, 255),
            ]);

            add([
                text("W: TURRET (3S,2B) | S: WALL (2S) | D: TRAP (1S,1B)", { size: 14, font: "monospace" }),
                pos(width() / 2, height() / 2 + 70),
                anchor("center"),
                color(200, 200, 200),
            ]);

            const startMsg = add([
                text("PRESS SPACE TO INITIALIZE", { size: 24, font: "monospace" }),
                pos(width() / 2, height() / 2 + 160),
                anchor("center"),
            ]);

            onUpdate(() => {
                startMsg.opacity = wave(0.3, 1, time() * 5);
            });

            onKeyPress("space", () => {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                sounds.waveStart();
                go("main");
            });
        });

        scene("main", () => {
            const currentMap = "wide_map";
            add([
                sprite(currentMap, { width: 1280, height: 720 }),
                pos(0, 0),
                z(-1)
            ]);
            let currentWave = 1;

            // Grid & Structured Layouts
            const tileSize = 40;
            const cols = Math.floor(1280 / tileSize);
            const rows = Math.floor(720 / tileSize);
            let grid = Array(cols).fill().map(() => Array(rows).fill(0));

            const layouts = [
                // Layout 0: Chokepoints
                [
                    { x: 10, y: 3, w: 2, h: 4 }, { x: 10, y: 11, w: 2, h: 5 },
                    { x: 20, y: 6, w: 2, h: 7 }
                ],
                // Layout 1: Ruined City Blocks
                [
                    { x: 8, y: 3, w: 4, h: 3 }, { x: 17, y: 3, w: 4, h: 4 }, { x: 26, y: 3, w: 3, h: 3 },
                    { x: 8, y: 11, w: 4, h: 3 }, { x: 17, y: 11, w: 4, h: 4 }, { x: 26, y: 11, w: 3, h: 3 }
                ],
                // Layout 2: Maze
                [
                    { x: 12, y: 1, w: 2, h: 9 }, { x: 12, y: 14, w: 2, h: 3 },
                    { x: 18, y: 4, w: 2, h: 13 }, { x: 25, y: 1, w: 2, h: 10 }
                ]
            ];
            const currentLayout = choose(layouts);

            function updateGridRect(gx, gy, gw, gh, val) {
                for (let i = gx; i < gx + gw; i++) {
                    for (let j = gy; j < gy + gh; j++) {
                        if (i >= 0 && i < cols && j >= 0 && j < rows) grid[i][j] = val;
                    }
                }
            }

            // Generate Obstacles based on layout
            for (let block of currentLayout) {
                updateGridRect(block.x, block.y, block.w, block.h, 1);
                const obsType = choose(["obs_ruins", "obs_car", "obs_playground", "obs_ground"]);
                add([
                    sprite(obsType, { width: block.w * tileSize, height: block.h * tileSize }),
                    pos(block.x * tileSize, block.y * tileSize),
                    area(),
                    body({ isStatic: true }),
                    "obstacle"
                ]);
            }

            // A* Pathfinding Implementation
            function getGridCoords(p) {
                return { x: Math.floor(p.x / tileSize), y: Math.floor(p.y / tileSize) };
            }

            function heuristic(a, b) {
                return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
            }

            function findPath(startPos, endPos) {
                let start = getGridCoords(startPos);
                let end = getGridCoords(endPos);

                // Clamp end
                end.x = Math.max(0, Math.min(cols - 1, end.x));
                end.y = Math.max(0, Math.min(rows - 1, end.y));
                start.x = Math.max(0, Math.min(cols - 1, start.x));
                start.y = Math.max(0, Math.min(rows - 1, start.y));

                let openSet = [start];
                let cameFrom = {};
                let gScore = {};
                let fScore = {};

                const toKey = (n) => `${n.x},${n.y}`;
                gScore[toKey(start)] = 0;
                fScore[toKey(start)] = heuristic(start, end);

                let iterations = 0;
                while (openSet.length > 0 && iterations < 500) {
                    iterations++;
                    openSet.sort((a, b) => fScore[toKey(a)] - fScore[toKey(b)]);
                    let current = openSet.shift();

                    if (current.x === end.x && current.y === end.y) {
                        let path = [];
                        let curr = current;
                        while (cameFrom[toKey(curr)]) {
                            // Node center + offset for smoother steering
                            path.push(vec2(curr.x * tileSize + tileSize / 2, curr.y * tileSize + tileSize / 2));
                            curr = cameFrom[toKey(curr)];
                        }
                        return path.reverse();
                    }

                    const neighbors = [
                        { x: current.x + 1, y: current.y }, { x: current.x - 1, y: current.y },
                        { x: current.x, y: current.y + 1 }, { x: current.x, y: current.y - 1 },
                        // Diagonals
                        { x: current.x + 1, y: current.y + 1 }, { x: current.x - 1, y: current.y - 1 },
                        { x: current.x - 1, y: current.y + 1 }, { x: current.x + 1, y: current.y - 1 }
                    ];

                    for (let n of neighbors) {
                        if (n.x < 0 || n.x >= cols || n.y < 0 || n.y >= rows) continue;
                        if (grid[n.x][n.y] === 1) continue; // Wall

                        // Prevent cutting diagonal corners through walls
                        if (n.x !== current.x && n.y !== current.y) {
                            if (grid[current.x][n.y] === 1 || grid[n.x][current.y] === 1) continue;
                        }

                        let tentative_gScore = gScore[toKey(current)] + ((n.x !== current.x && n.y !== current.y) ? 1.414 : 1);
                        let nKey = toKey(n);

                        if (gScore[nKey] === undefined || tentative_gScore < gScore[nKey]) {
                            cameFrom[nKey] = current;
                            gScore[nKey] = tentative_gScore;
                            fScore[nKey] = tentative_gScore + heuristic(n, end);
                            if (!openSet.some(o => o.x === n.x && o.y === n.y)) {
                                openSet.push(n);
                            }
                        }
                    }
                }
                return []; // No path found
            }
            let enemiesInWave = 0;
            let enemiesSpawned = 0;
            let waveState = "warning"; // warning, action, rest
            // Guardian Girl
            const girl = add([
                sprite("girl", { width: 60, height: 60 }),
                pos(150, height() / 2),
                area(),
                anchor("center"),
                "girl",
                { hp: 100, maxHp: 100 }
            ]);

            girl.play("idle");
            girl.onAnimEnd((anim) => {
                if (anim === "yawn" || anim === "swing") {
                    girl.play("idle");
                }
            });
            loop(10, () => {
                girl.play(choose(["yawn", "swing"]));
            });

            const girlHpBar = add([
                rect(100, 10),
                pos(150, height() / 2 - 60),
                color(50, 50, 50),
                outline(2),
                anchor("center"),
            ]);
            const girlHpFill = girlHpBar.add([
                rect(100, 10),
                pos(-50, -5), color(0, 255, 100),
                anchor("topleft"),
            ]);

            // Player
            const player = add([
                sprite("player", { width: 50, height: 50 }),
                pos(250, height() / 2),
                area(),
                body(),
                anchor("center"),
                "player",
                { speed: 300, carryScrap: 0, carryBattery: 0, scrapCount: 3, batteryCount: 2, maxCarry: 3 }
            ]);

            const carrier = player.add([
                rect(15, 15),
                color(200, 200, 200),
                pos(0, -30),
                anchor("center"),
                opacity(0),
            ]);

            const carrierText = carrier.add([
                text("0", { size: 10 }),
                color(0, 0, 0),
                anchor("center"),
            ]);

            // Movement
            onKeyDown(CONTROLS.MOVE_UP, () => player.move(0, -player.speed));
            onKeyDown(CONTROLS.MOVE_DOWN, () => player.move(0, player.speed));
            onKeyDown(CONTROLS.MOVE_LEFT, () => player.move(-player.speed, 0));
            onKeyDown(CONTROLS.MOVE_RIGHT, () => player.move(player.speed, 0));

            // Resources
            function dropResource(p) {
                const r = rand();
                if (r < 0.45) {
                    add([rect(10, 10), color(200, 200, 200), pos(p), area(), anchor("center"), "resource", { type: "scrap" }]);
                } else if (r < 0.7) {
                    add([circle(6), color(255, 255, 0), pos(p), area(), anchor("center"), "resource", { type: "battery" }]);
                }
            }

            player.onCollide("resource", (r) => {
                destroy(r);
                if (r.type === "scrap") player.scrapCount++;
                else player.batteryCount++;
                sounds.collect();
            });

            const base = add([
                rect(140, 140),
                pos(150, height() / 2),
                color(0, 255, 0),
                opacity(0.1),
                area(),
                outline(2, { color: rgb(0, 255, 0) }),
                anchor("center"),
                "base"
            ]);



            // Construction System
            const BUILD_COSTS = {
                turret: { scrap: 3, battery: 2 },
                wall: { scrap: 2, battery: 0 },
                trap: { scrap: 1, battery: 1 },
            };

            function build(type) {
                const cost = BUILD_COSTS[type];
                if (player.scrapCount >= cost.scrap && player.batteryCount >= cost.battery) {
                    player.scrapCount -= cost.scrap;
                    player.batteryCount -= cost.battery;
                    const buildPos = vec2(player.pos.x, player.pos.y);

                    if (type === "turret") {
                        add([
                            rect(30, 30),
                            pos(buildPos),
                            color(180, 180, 255),
                            area(),
                            outline(4),
                            anchor("center"),
                            "building",
                            "turret",
                            { hp: 80, fireRate: 0.8, timer: 0 }
                        ]);
                        add([
                            text("TURRET", { size: 10 }),
                            pos(buildPos.x, buildPos.y + 25),
                            anchor("center")
                        ]);
                        sounds.build();
                    } else if (type === "wall") {
                        const w = add([
                            rect(40, 40),
                            pos(buildPos),
                            color(80, 80, 80),
                            area(),
                            body({ isStatic: true }),
                            outline(4),
                            anchor("center"),
                            "obstacle",
                            "wall",
                            { hp: 150 }
                        ]);
                        let gc = getGridCoords(buildPos);
                        if (gc.x >= 0 && gc.x < cols && gc.y >= 0 && gc.y < rows) {
                            grid[gc.x][gc.y] = 1;
                            w.gridCoords = gc;
                            // Trigger all enemies to recalculate
                            every("enemy", (e) => e.trigger("recalc_path"));
                        }
                        sounds.build();
                    } else if (type === "trap") {
                        add([
                            rect(20, 20),
                            pos(buildPos),
                            color(255, 50, 0),
                            area(),
                            anchor("center"),
                            "trap",
                        ]);
                        sounds.build();
                    }
                }
            }

            onKeyPress(CONTROLS.BUILD_TURRET, () => build("turret"));
            onKeyPress(CONTROLS.BUILD_WALL, () => build("wall"));
            onKeyPress(CONTROLS.BUILD_TRAP, () => build("trap"));

            // Upgrades
            onKeyPress(CONTROLS.UPGRADE_SPEED, () => {
                if (player.batteryCount >= 5) {
                    player.batteryCount -= 5;
                    player.speed += 50;
                    sounds.build();
                }
            });
            onKeyPress(CONTROLS.UPGRADE_CAPACITY, () => {
                if (player.scrapCount >= 5) {
                    player.scrapCount -= 5;
                    player.maxCarry += 2;
                    sounds.build();
                }
            });

            // Turret AI
            onUpdate("turret", (t) => {
                t.timer += dt();
                if (t.timer >= t.fireRate) {
                    const enemies = get("enemy");
                    if (enemies.length > 0) {
                        let closest = enemies[0];
                        let minDist = t.pos.dist(closest.pos);
                        for (let e of enemies) {
                            const d = t.pos.dist(e.pos);
                            if (d < minDist) {
                                minDist = d;
                                closest = e;
                            }
                        }

                        if (minDist < 350) {
                            t.timer = 0;
                            const dir = closest.pos.sub(t.pos).unit();
                            add([
                                rect(12, 4),
                                pos(t.pos),
                                color(255, 255, 0),
                                area(),
                                rotate(dir.angle()),
                                move(dir, 600),
                                offscreen({ destroy: true }),
                                "bullet",
                            ]);
                            sounds.shoot();
                        }
                    }
                }
            });

            onCollide("bullet", "enemy", (b, e) => {
                destroy(b);
                if (e.is("heavy")) {
                    e.hp -= 3; // Reduced damage to shielded heavy enemies
                } else {
                    e.hp -= 15;
                }

                if (e.hp <= 0) {
                    destroy(e);
                    createExplosion(vec2(e.pos.x, e.pos.y));
                    sounds.explode();
                    dropResource(vec2(e.pos.x, e.pos.y));
                }
            });

            onCollide("trap", "enemy", (t, e) => {
                destroy(t);
                destroy(e);
                createExplosion(vec2(e.pos.x, e.pos.y));
                sounds.explode();
                dropResource(vec2(e.pos.x, e.pos.y));
            });
            function createExplosion(p) {
                const expl = add([
                    circle(30),
                    color(255, 165, 0),
                    pos(p),
                    scale(1),
                    anchor("center"),
                    opacity(1),
                ]);
                onUpdate(() => {
                    expl.opacity -= dt() * 3;
                    expl.scale = expl.scale.add(vec2(dt() * 0.2));
                    if (expl.opacity <= 0) destroy(expl);
                });
            }

            function createHealEffect(p) {
                const ring = add([
                    circle(10),
                    color(100, 255, 100),
                    pos(p.x, p.y),
                    scale(1),
                    anchor("center"),
                    opacity(0.8),
                    outline(2, rgb(255, 255, 255)),
                    z(150),
                ]);
                ring.onUpdate(() => {
                    ring.opacity -= dt() * 1.5;
                    ring.scale = ring.scale.add(vec2(dt() * 2));
                    ring.pos.y -= dt() * 20;
                    if (ring.opacity <= 0) destroy(ring);
                });
            }

            // Enemy & Wave Management
            function spawnEnemy() {
                const spawnPos = vec2(width() + 50, rand(120, height() - 80));

                const isHeavy = currentWave >= 2 && rand() < (0.1 + currentWave * 0.05);

                if (isHeavy) {
                    add([
                        rect(35, 35),
                        color(0, 150, 255), // Blue shield color
                        pos(spawnPos),
                        area(),
                        body(),
                        anchor("center"),
                        "enemy",
                        "heavy",
                        {
                            speed: 25 + currentWave * 1.5,
                            hp: 50 + Math.floor(currentWave * 20),
                        }
                    ]);
                } else {
                    add([
                        rect(25, 25),
                        color(255, 0, 0),
                        pos(spawnPos),
                        area(),
                        body(),
                        anchor("center"),
                        "enemy",
                        {
                            speed: 40 + currentWave * 2,
                            hp: 1 + Math.floor(currentWave / 2),
                        }
                    ]);
                }
                enemiesSpawned++;
            }

            let phase = "day";
            let dayTimer = 0;
            const phaseLabel = add([
                text("DAY", { size: 48, font: "monospace" }),
                pos(width() / 2, height() / 2 - 100),
                anchor("center"),
                opacity(0),
                fixed(),
            ]);

            function startDay() {
                phase = "day";
                dayTimer = 25; // 25s build phase
                phaseLabel.text = "DAY " + currentWave + " - PREPARE";
                phaseLabel.color = rgb(0, 255, 100);
                tween(0, 1, 0.5, (v) => phaseLabel.opacity = v, easings.easeOutQuad);

                wait(2, () => {
                    tween(1, 0, 0.5, (v) => phaseLabel.opacity = v, easings.easeInQuad);
                });
            }

            function startNight() {
                phase = "night";
                enemiesInWave = 5 + currentWave * 4;
                enemiesSpawned = 0;

                phaseLabel.text = "NIGHT " + currentWave + " - DEFEND";
                phaseLabel.color = rgb(255, 50, 50);
                tween(0, 1, 0.5, (v) => phaseLabel.opacity = v, easings.easeOutQuad);
                sounds.waveStart();

                wait(2, () => {
                    tween(1, 0, 0.5, (v) => phaseLabel.opacity = v, easings.easeInQuad);
                    spawnLoop();
                });
            }

            function spawnLoop() {
                if (enemiesSpawned < enemiesInWave && phase === "night") {
                    spawnEnemy();
                    wait(rand(1.5, 3.0) / (1 + currentWave * 0.1), spawnLoop);
                }
            }

            onUpdate(() => {
                if (phase === "day") {
                    dayTimer -= dt();
                    if (dayTimer <= 0) {
                        startNight();
                    }
                } else if (phase === "night" && enemiesSpawned >= enemiesInWave && get("enemy").length === 0) {
                    currentWave++;
                    startDay();
                }

                // Reactive HP Bar update
                if (girl && girlHpFill) {
                    girlHpFill.width = Math.max(0, (girl.hp / girl.maxHp) * 100);
                }
            });

            startDay();

            // Event listener for path recalculation
            on("recalc_path", "enemy", (e) => {
                // To avoid physics snagging at spawn, project them slightly left to start finding path on grid
                let internalPath = findPath(vec2(e.pos.x - 20, e.pos.y), vec2(150, height() / 2));
                if (internalPath && internalPath.length > 0) {
                    e.path = internalPath;
                }
            });

            onAdd("enemy", (e) => {
                e.trigger("recalc_path");
            });

            onUpdate("enemy", (e) => {
                let targetPos = vec2(150, height() / 2); // default core
                let dir = vec2(0, 0);

                if (e.path && e.path.length > 0) {
                    let nextNode = e.path[0];
                    if (e.pos.dist(nextNode) < 25) { // increased distance to turn earlier
                        e.path.shift();
                        if (e.path.length > 0) targetPos = e.path[0];
                    } else {
                        targetPos = nextNode;
                    }
                    dir = targetPos.sub(e.pos).unit();
                } else {
                    // Re-calc
                    if (rand() < 0.05) e.trigger("recalc_path");
                    dir = vec2(-1, 0); // fallback move left globally
                }

                // Separation (Boids) to stop stacking perfectly
                const enemies = get("enemy");
                for (const other of enemies) {
                    if (other !== e) {
                        let d = e.pos.dist(other.pos);
                        if (d < 40) {
                            dir = dir.add(e.pos.sub(other.pos).unit().scale(0.8));
                        }
                    }
                }

                // Final Obstacle Slide protection for physics snags (acts as a force field)
                const obstacles = get("obstacle");
                for (const obs of obstacles) {
                    let d = e.pos.dist(obs.pos);
                    let size = Math.max(obs.width || 40, obs.height || 40);
                    let avoidanceRadius = size / 2 + 35; // keep radius tight to not push them off path
                    if (d < avoidanceRadius) {
                        let pushDir = e.pos.sub(obs.pos).unit();
                        dir = dir.add(pushDir.scale(0.5)); // push gently away
                    }
                }

                e.move(dir.unit().scale(e.speed));
            });

            onCollide("enemy", "girl", (e, g) => {
                destroy(e);
                g.hp -= 15;
                shake(15);
                sounds.damage();
                if (g.hp <= 0) go("gameover");
            });

            onCollide("bullet", "obstacle", (b, o) => {
                destroy(b);
            });
            on("destroy", "wall", (w) => {
                if (w.gridCoords) grid[w.gridCoords.x][w.gridCoords.y] = 0; // Free grid spot
                every("enemy", (e) => e.trigger("recalc_path"));
            });

            onCollide("enemy", "building", (e, b) => { // Kept for turrets
                destroy(e);
                b.hp -= 30;
                shake(5);
                if (b.hp <= 0) destroy(b);
            });

            // UI
            const ui = add([
                rect(width(), 80),
                pos(0, 0),
                color(10, 10, 30, 0.8),
                fixed(),
                z(100),
            ]);
            ui.add([
                rect(width(), 2),
                pos(0, 78),
                color(0, 255, 100, 0.5),
            ]);

            const bottomUi = add([
                rect(width(), 60),
                pos(0, height() - 60),
                color(10, 10, 30, 0.8),
                fixed(),
                z(100),
            ]);
            bottomUi.add([
                rect(width(), 2),
                pos(0, 0),
                color(0, 100, 255, 0.5),
            ]);
            bottomUi.add([
                text("SYSTEM STATUS: NOMINAL | SECTOR 7 DEFENSE ACTIVE", { size: 16, font: "monospace" }),
                pos(20, 20),
                color(0, 255, 255),
            ]);
            const scrapLabel = ui.add([
                text("SCRAP: 0", { size: 16, font: "monospace" }),
                pos(20, 15),
                color(200, 200, 200),
            ]);
            const batteryLabel = ui.add([
                text("BATT: 0", { size: 16, font: "monospace" }),
                pos(20, 40),
                color(255, 255, 0),
            ]);
            ui.add([
                text("W: TURRET (3S,2B) | S: WALL (2S) | D: TRAP (1S,1B)", { size: 12, font: "monospace" }),
                pos(150, 15),
                color(200, 200, 200),
            ]);
            ui.add([
                text("Q: SPD UP (5B) | E: CAP UP (5S)", { size: 12, font: "monospace" }),
                pos(150, 40),
                color(0, 255, 255),
            ]);

            const waveCounterLabel = ui.add([
                text("WAVE: 1", { size: 24, font: "monospace" }),
                pos(150, 20),
                anchor("topright"), // Dummy anchor adjustment
            ]);
            // Fix position
            waveCounterLabel.pos = vec2(width() - 20, 20);
            waveCounterLabel.anchor = "topright";

            add([
                text("CORE INTEGRITY", { size: 12, font: "monospace" }),
                pos(150, height() / 2 - 75),
                anchor("center"),
                color(0, 255, 100),
            ]);

            onUpdate(() => {
                scrapLabel.text = "S: " + player.scrapCount;
                batteryLabel.text = "B: " + player.batteryCount;
                waveCounterLabel.text = (phase === "day" ? "DAY " : "NIGHT ") + currentWave + (phase === "day" ? " (" + Math.ceil(dayTimer) + "s)" : "");
            });
        });

        scene("gameover", () => {
            add([
                text("GUARDIAN FAILED", { size: 50 }),
                pos(width() / 2, height() / 2 - 50),
                anchor("center"),
            ]);
            add([
                text("Press any key to retry", { size: 20 }),
                pos(width() / 2, height() / 2 + 50),
                anchor("center"),
            ]);
            onKeyPress(() => go("start"));
        });

        go("start");
    </script>
</body>

</html>
